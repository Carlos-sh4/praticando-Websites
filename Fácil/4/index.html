<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Card de Produto</title>
</head>
<body>
    <main class="pg">
        <article class="card">
            <img class="card-img" src="tenis-card.jpg" alt="foto do tenis">
            <div class="card-body">
                <h2 class="card-name">Tênis Preto</h2>
                <p class="card-desc">Confortável e Leve, ideal para o dia a dia!</p>
                <span class="card-price">R$ 249,90</span>
                <button class="card-btn">Adicionar ao Carrinho</button>
            </div>
        </article>
    </main>
</body>
</html>
