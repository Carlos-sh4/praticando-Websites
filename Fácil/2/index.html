<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <main>
        <form action="#" method="post">
            <fieldset>
            <div>
                    <legend>Dados Pessoais</legend>
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="name" placeholder="name" required autocomplete="name" >
                                </div>
                                <div>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                                </div>
                                <div>
                    <label for="tel">Telefone</label>
                    <input type="tel" id="tel" name="tel" required autocomplete="tel">
                                </div>
                                <div>
                    <label for="categoria">Categoria</label>
                    <select name="categoria" id="categoria">
                        <option value="">Selecione</option>
                        <option value="trabalho">Proposta de Trabalho</option>
                        <option value="dúvida">Dúvida Técnica</option>
                        <option value="outro">Outro</option>
                    </select>
                                </div>
                </fieldset>
                <fieldset>
                    <legend>Mensagem</legend>
            <div>
                    <label for="msg">Mensagem</label>
                    <textarea name="msg" id="msg" required rows="5" placeholder="Escreva sua Mensagem..."></textarea>
                                </div>
                                <div>
                    <input type="checkbox" name="aceite" id="aceite">
                    <label for="aceite">Concordo em ser contratado de volta</label>
                                </div>
                </fieldset>

            <button type="submit">Enviar mensagem</button>
        </form>
    </main>
    
</body>
</html>
